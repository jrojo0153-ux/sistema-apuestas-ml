name: Gemini Auto-Fixer Total

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Google AI SDK
        run: pip install -U google-generativeai  # Forzamos actualización

      - name: Gemini Deep Clean and Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import google.generativeai as genai
          import glob
          import time

          # Configuración de la API
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])

          # Intentamos usar el modelo 1.5 flash que es el estándar actual
          # Si falla, el script te dirá qué modelos tienes disponibles
          try:
              model = genai.GenerativeModel('gemini-1.5-flash')
          except Exception as e:
              print(f"Error al cargar modelo: {e}")
              model = genai.GenerativeModel('gemini-pro') # Fallback a Pro si Flash falla

          # Extensiones a revisar
          extensions = ['*.py', '*.js', '*.ts', '*.html', '*.css', '*.json']
          files = []
          for ext in extensions:
              files.extend(glob.glob(f'**/{ext}', recursive=True))

          # Filtros de exclusión
          files = [f for f in files if not any(x in f for x in ['.github', 'node_modules', 'venv', '__pycache__'])]

          for file_path in files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      original_content = f.read()
                  
                  if not original_content.strip() or len(original_content) < 10:
                      continue

                  print(f"🤖 Analizando: {file_path}")
                  
                  prompt = f"Actúa como un experto en programación. Corrige errores, mejora la eficiencia y limpia el código del archivo {file_path}. Devuelve exclusivamente el código corregido, sin explicaciones y sin usar bloques de Markdown (```)."
                  
                  # Añadimos un pequeño delay para evitar saturar la API gratuita
                  time.sleep(2) 

                  response = model.generate_content([prompt, original_content])
                  
                  if not response.text:
                      continue

                  new_code = response.text.strip()

                  # Limpieza de basura (Markdown) que a veces mete la IA
                  if "```" in new_code:
                      lines = new_code.splitlines()
                      clean_lines = [l for l in lines if not l.strip().startswith("```")]
                      new_code = "\n".join(clean_lines)

                  if new_code and new_code != original_content:
                      with open(file_path, 'w', encoding='utf-8') as f:
                          f.write(new_code)
                      print(f"✅ {file_path} CORREGIDO.")
                  else:
                      print(f"   {file_path} sin cambios necesarios.")
                      
              except Exception as e:
                  print(f"❌ Error en {file_path}: {e}")
          EOF

      - name: Guardar cambios de la IA
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 IA: Corrección de errores y limpieza de código"
          commit_author: "Gemini AI <actions@github.com>"
