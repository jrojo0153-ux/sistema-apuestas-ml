name: Gemini 3.5 Auto-Fixer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Gemini 3.5 Correction
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import requests
          import glob
          import time
          import json

          # Configuración basada en tu CURL
          API_KEY = os.environ['GEMINI_API_KEY']
          URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent"
          HEADERS = {
              "x-goog-api-key": API_KEY,
              "Content-Type": "application/json"
          }

          # Extensiones a revisar
          extensions = ['*.py', '*.js', '*.ts', '*.html', '*.css']
          files = []
          for ext in extensions:
              files.extend(glob.glob(f'**/{ext}', recursive=True))

          # Excluir carpetas del sistema
          files = [f for f in files if not any(x in f for x in ['.github', 'node_modules', 'venv'])]

          for file_path in files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  if len(content) < 10: continue

                  print(f"🤖 Analizando con Gemini 3.5: {file_path}")
                  
                  # Estructura de datos idéntica a tu ejemplo
                  data = {
                      "contents": [
                          {
                              "parts": [
                                  {
                                      "text": f"Actúa como programador experto. Corrige errores y optimiza este código. Devuelve SOLO el código corregido, sin explicaciones ni bloques markdown:\n\n{content}"
                                  }
                              ]
                          }
                      ]
                  }
                  
                  response = requests.post(f"{URL}", headers=HEADERS, json=data)
                  result = response.json()

                  # Extraer el texto de la respuesta JSON
                  if 'candidates' in result:
                      new_code = result['candidates'][0]['content']['parts'][0]['text'].strip()
                      
                      # Limpiar posibles bloques de código markdown
                      if "```" in new_code:
                          parts = new_code.split("```")
                          new_code = max(parts, key=len).strip()
                          if "\n" in new_code:
                              first_line = new_code.split("\n")[0].lower()
                              if first_line in ['python', 'javascript', 'html', 'css', 'ts']:
                                  new_code = "\n".join(new_code.split("\n")[1:])

                      if new_code and new_code != content:
                          with open(file_path, 'w', encoding='utf-8') as f:
                              f.write(new_code)
                          print(f"✅ {file_path} actualizado con éxito.")
                      else:
                          print(f"   {file_path} no requería cambios.")
                  else:
                      print(f"❌ Error en API para {file_path}: {result}")
                  
                  time.sleep(2) # Respetar límites

              except Exception as e:
                  print(f"❌ Error procesando {file_path}: {e}")
          EOF

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 IA: Correcciones aplicadas con Gemini 3.5 Flash"
