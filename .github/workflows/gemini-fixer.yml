name: Gemini Auto-Fixer 2025

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Actualizado para evitar avisos de depreciación

      - name: Install New Google GenAI SDK
        run: pip install -U google-genai # Instalamos la NUEVA librería oficial

      - name: Gemini Deep Clean and Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import glob
          import time
          from google import genai # Usando la nueva librería

          # Configuración con el nuevo cliente
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          MODEL_ID = "gemini-1.5-flash"

          # Extensiones a revisar
          extensions = ['*.py', '*.js', '*.ts', '*.html', '*.css', '*.json']
          files = []
          for ext in extensions:
              files.extend(glob.glob(f'**/{ext}', recursive=True))

          # Excluir carpetas innecesarias
          files = [f for f in files if not any(x in f for x in ['.github', 'node_modules', 'venv', '__pycache__'])]

          for file_path in files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      original_content = f.read()
                  
                  if not original_content.strip() or len(original_content) < 10:
                      continue

                  print(f"🤖 Analizando con Nueva API: {file_path}")
                  
                  prompt = f"""
                  Actúa como experto senior. Corrige bugs, errores de lógica y mejora el archivo: {file_path}
                  
                  CONTENIDO:
                  {original_content}
                  
                  REGLAS:
                  1. Devuelve SOLO el código corregido.
                  2. No uses bloques de markdown (sin ```).
                  3. Si no hay errores, devuelve el código original exacto.
                  """
                  
                  # Llamada con la nueva sintaxis de google-genai
                  response = client.models.generate_content(
                      model=MODEL_ID,
                      contents=prompt
                  )
                  
                  if not response.text:
                      continue

                  new_code = response.text.strip()

                  # Limpieza de seguridad por si la IA ignora las reglas de markdown
                  if "```" in new_code:
                      new_code = new_code.split("```")[-2] # Intenta extraer el bloque de código
                      if new_code.startswith("python\n") or new_code.startswith("javascript\n"):
                          new_code = "\n".join(new_code.split("\n")[1:])

                  if new_code and new_code != original_content:
                      with open(file_path, 'w', encoding='utf-8') as f:
                          f.write(new_code)
                      print(f"✅ {file_path} REPARADO.")
                  else:
                      print(f"   {file_path} ya estaba correcto.")
                  
                  # Respetar límites de la API gratuita
                  time.sleep(4) 

              except Exception as e:
                  print(f"❌ Error crítico en {file_path}: {e}")
          EOF

      - name: Guardar cambios de la IA
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 IA: Corrección automática (Nueva API Gemini)"
          commit_author: "Gemini AI <actions@github.com>"
