name: Gemini 3.5 ML System Evolver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  upgrade-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Transform to ML System
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat << 'EOF' > evolve.py
          import os, requests, time
          URL = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          HEADERS = {'Content-Type': 'application/json'}
          
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.py') and file != 'evolve.py':
                      file_path = os.path.join(root, file)
                      with open(file_path, 'r') as f: original_content = f.read()
                      
                      prompt = f"Optimiza este código Python para un sistema de apuestas de ML profesional. Devuelve SOLO el código:
{original_content}"
                      payload = {"contents": [{"parts": [{"text": prompt}]}]}
                      
                      try:
                          res = requests.post(URL, json=payload, headers=HEADERS)
                          if res.status_code == 200:
                              new_code = res.json()['candidates'][0]['content']['parts'][0]['text']
                              if "```" in new_code: new_code = new_code.split("```")[1].replace('python', '').strip()
                              with open(file_path, 'w') as f: f.write(new_code)
                              print(f"Updated {file}")
                          time.sleep(2)
                      except Exception as e: print(f"Error in {file}: {e}")
          EOF
          python evolve.py

      - name: Save Evolutionary Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 IA: Upgrade a Sistema ML Predictivo"
