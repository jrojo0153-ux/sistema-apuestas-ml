name: Gemini ML System Evolver

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  evolve-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que la IA haga commits
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: AI Evolution Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import requests
          import glob
          import time
          import json

          # Configuración de la API
          API_KEY = os.environ['GEMINI_API_KEY']
          # Usamos 1.5-flash por su gran ventana de contexto y velocidad
          URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
          HEADERS = {
              "x-goog-api-key": API_KEY,
              "Content-Type": "application/json"
          }

          # 1. Leer instrucciones maestras (si existen)
          master_plan = ""
          if os.path.exists("GEMINI.md"):
              with open("GEMINI.md", "r", encoding="utf-8") as f:
                  master_plan = f.read()

          # 2. Seleccionar archivos clave para la evolución
          # Buscamos archivos de Python que suelen contener la lógica
          files = glob.glob('**/*.py', recursive=True)
          
          # Filtro para evitar archivos innecesarios
          exclude_list = ['.github', 'venv', 'node_modules', '__pycache__']
          files = [f for f in files if not any(x in f for x in exclude_list)]

          for file_path in files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  if len(content) < 50: continue # Ignorar archivos casi vacíos

                  print(f"🚀 Evolucionando lógica de: {file_path}")
                  
                  # PROMPT ESPECIALIZADO EN MACHINE LEARNING Y RENTABILIDAD
                  prompt = f"""
                  ESTRATEGIA MAESTRA: {master_plan}
                  
                  ARCHIVO A EVOLUCIONAR: {file_path}
                  CÓDIGO ACTUAL:
                  {content}
                  
                  TAREA:
                  Reescribe este archivo para convertirlo en un sistema de Machine Learning de alto rendimiento.
                  1. Si es de datos: Implementa limpieza proactiva y Feature Engineering (escalado, normalización).
                  2. Si es de predicción: Usa modelos potentes (XGBoost, RandomForest o Redes Neuronales) con validación cruzada.
                  3. Si es de banca/dinero: Implementa Criterio de Kelly Fraccional y gestión de riesgo avanzada.
                  4. Si es el motor principal: Añade un 'Feedback Loop' para que el sistema aprenda de sus errores pasados.
                  
                  REGLAS:
                  - Devuelve ÚNICAMENTE el código corregido.
                  - No incluyas comentarios explicativos fuera del código.
                  - No uses bloques de Markdown (```).
                  - Asegúrate de que las importaciones (pandas, numpy, sklearn, etc.) sean correctas.
                  """
                  
                  data = {
                      "contents": [{
                          "parts": [{"text": prompt}]
                      }]
                  }
                  
                  response = requests.post(f"{URL}", headers=HEADERS, json=data)
                  
                  if response.status_code == 200:
                      res_json = response.json()
                      if 'candidates' in res_json:
                          new_code = res_json['candidates'][0]['content']['parts'][0]['text'].strip()
                          
                          # Limpieza de seguridad de Markdown
                          if "```" in new_code:
                              parts = new_code.split("```")
                              new_code = max(parts, key=len).strip()
                              if "\n" in new_code:
                                  first_line = new_code.split("\n")[0].lower()
                                  if first_line in ['python', 'py']:
                                      new_code = "\n".join(new_code.split("\n")[1:])

                          # Guardar la evolución si el código es válido
                          if new_code and len(new_code) > (len(content) * 0.5):
                              with open(file_path, 'w', encoding='utf-8') as f:
                                  f.write(new_code)
                              print(f"✅ {file_path} ha evolucionado.")
                  else:
                      print(f"❌ Error API ({response.status_code}): {response.text}")
                  
                  # Espera de seguridad para no saturar la API gratuita (60 RPM limit)
                  time.sleep(6)

              except Exception as e:
                  print(f"❌ Fallo en evolución de {file_path}: {e}")
          EOF

      - name: Commit and Push Evolutionary Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 IA: Evolución a Sistema ML Predictivo v2.0"
          commit_author: "Gemini ML Architect <actions@github.com>"
